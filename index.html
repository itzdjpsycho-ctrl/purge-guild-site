<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Node War Log</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300..900&family=IBM+Plex+Mono:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  /* ============================================================
     DESIGN TOKENS
     ============================================================ */
  :root{
    --bg:            #0B0C0E;
    --bg-grain:      #111317;
    --panel:         #15171B;
    --panel-raised:  #1C1F24;
    --hairline:      #2A2D33;
    --hairline-soft: #202226;

    --text:          #ECE7DD;
    --text-muted:    #8A8D93;
    --text-faint:    #5C5F66;

    --gold:          #D9A441;
    --gold-bright:   #F0C36B;
    --red:           #B2402F;
    --red-bright:    #D65A45;
    --green:         #4A9F5D;
    --green-bright:  #5BC976;
    --bronze:        #8C6A3F;
    --orange:        #E0793C;

    --font-display:  'Fraunces', serif;
    --font-mono:     'IBM Plex Mono', monospace;
    --font-ui:       'Inter', sans-serif;
  }

  *{ box-sizing:border-box; margin:0; padding:0; }

  html{ scroll-behavior:smooth; }

  body{
    background:var(--bg);
    color:var(--text);
    font-family:var(--font-ui);
    min-height:100vh;
    position:relative;
    overflow-x:hidden;
  }

  /* faint atmospheric texture, no image assets needed */
  body::before{
    content:"";
    position:fixed;
    inset:0;
    pointer-events:none;
    z-index:0;
    background:
      repeating-linear-gradient(135deg, rgba(255,255,255,0.012) 0px, rgba(255,255,255,0.012) 1px, transparent 1px, transparent 3px),
      radial-gradient(ellipse 80% 50% at 50% -10%, rgba(217,164,65,0.06), transparent 60%);
  }

  main, header, footer{ position:relative; z-index:1; }

  /* ============================================================
     HEADER
     ============================================================ */
  header{
    max-width:880px;
    margin:0 auto 24px;
    padding:22px 20px 18px;
    text-align:center;
    border:1px solid rgba(255,255,255,0.08);
    border-radius:36px;
    background:rgba(11,12,14,0.78);
    backdrop-filter:blur(16px);
    box-shadow:0 28px 72px rgba(0,0,0,0.28);
  }

  .eyebrow{
    font-family:var(--font-mono);
    font-size:10px;
    letter-spacing:0.28em;
    text-transform:uppercase;
    color:var(--text-faint);
    margin-bottom:10px;
  }

  h1{
    font-family:var(--font-display);
    font-optical-sizing:auto;
    font-weight:680;
    font-size:clamp(28px, 5vw, 42px);
    letter-spacing:-0.01em;
    color:var(--text);
  }

  h1 span{
    color:var(--gold);
    font-style:italic;
    font-weight:480;
  }

  .subtitle{
    font-size:14px;
    color:var(--text-muted);
    margin-top:10px;
    font-weight:400;
  }

  .record-badge{
    display:inline-flex;
    align-items:center;
    gap:10px;
    margin-top:16px;
    padding:8px 16px;
    border:1px solid rgba(255,255,255,0.08);
    border-radius:999px;
    font-family:var(--font-mono);
    font-size:12px;
    background:rgba(21,23,27,0.95);
  }
  .record-badge b.win{ color:var(--gold-bright); }
  .record-badge b.loss{ color:var(--red-bright); }
  .record-badge .div{ color:var(--text-faint); }

  /* ============================================================
     CAMPAIGN STRIP — signature element
     a row of war banners, color = outcome, order = chronology
     ============================================================ */
  .tab-folder{
    max-width:980px;
    margin:0 auto;
    padding:30px 24px 10px;
  }

  .tab-toolbar{
    display:flex;
    flex-wrap:wrap;
    align-items:center;
    justify-content:space-between;
    gap:14px;
    margin-bottom:10px;
  }

  .campaign-label{
    font-family:var(--font-mono);
    font-size:11px;
    letter-spacing:0.2em;
    text-transform:uppercase;
    color:var(--text-faint);
  }

  #campaignStrip{
    display:flex;
    flex-wrap:wrap;
    gap:10px;
  }

  .week-group{
    display:flex;
    flex-direction:column;
    align-items:flex-start;
    width:auto;
    min-width:0;
    position:relative;
    z-index:1;
  }

  .week-header{
    display:inline-flex;
    align-items:center;
    justify-content:center;
    gap:8px;
    padding:10px 16px;
    border:1px solid rgba(255,255,255,0.12);
    border-radius:999px;
    background:rgba(21,23,27,0.9);
    color:var(--text);
    font-family:var(--font-mono);
    font-size:12px;
    white-space:nowrap;
    cursor:pointer;
    transition:background 0.16s ease, border-color 0.16s ease, transform 0.16s ease, box-shadow 0.16s ease;
    width:auto;
    z-index:2;
  }

  .week-header:hover,
  .week-header:focus-visible{
    background:rgba(255,255,255,0.06);
    border-color:var(--gold);
    outline:none;
    transform:translateY(-1px);
  }

  .week-header::after{
    content:"▼";
    display:inline-block;
    transform:rotate(0deg);
    transition:transform 0.18s ease;
    font-size:10px;
    color:var(--text-muted);
  }

  .week-header[aria-expanded="true"]::after{
    transform:rotate(180deg);
  }

  .week-matches{
    display:flex;
    flex-wrap:wrap;
    gap:10px;
    margin-top:10px;
  }

  .week-picker{
    display:flex;
    align-items:center;
    gap:10px;
  }

  .week-picker-label{
    font-family:var(--font-mono);
    font-size:11px;
    letter-spacing:0.2em;
    text-transform:uppercase;
    color:var(--text-faint);
  }

  select#weekSelect{
    min-width:180px;
    border-radius:999px;
    border:1px solid var(--hairline);
    background:var(--panel);
    color:var(--text);
    padding:10px 14px;
    font-family:var(--font-mono);
    font-size:13px;
    cursor:pointer;
    appearance:none;
  }

  select#weekSelect:focus{
    outline:none;
    box-shadow:0 0 0 2px rgba(217,164,65,0.16);
  }

  .tab-list{
    display:flex;
    flex-wrap:wrap;
    gap:10px;
    align-items:flex-start;
    padding-bottom:8px;
  }

  .week-group{
    position:relative;
    z-index:1;
  }

  .week-matches{
    display:flex;
    flex-wrap:wrap;
    gap:10px;
    margin-top:10px;
    width:100%;
    z-index:1;
    position:relative;
    pointer-events:auto;
  }

  .tab{
    position:relative;
    z-index:1;
    flex:0 0 auto;
    min-width:130px;
    max-width:220px;
    background:var(--panel);
    border:1px solid rgba(255,255,255,0.08);
    border-radius:999px;
    cursor:pointer;
    font-family:var(--font-mono);
    color:var(--text-muted);
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    padding:16px 20px;
    gap:4px;
    transition:transform 0.18s ease, background 0.18s ease, border-color 0.18s ease, color 0.18s ease;
    white-space:nowrap;
  }
  .tab::before{
    content:"";
    position:absolute;
    top:0; left:0; right:0;
    height:4px;
    border-top-left-radius:999px;
    border-top-right-radius:999px;
    display:none;
  }
  .tab[data-outcome="victory"]{
    background:var(--green);
    border-color:var(--green);
    color:#fff;
  }
  .tab[data-outcome="defeat"]{
    background:var(--red);
    border-color:var(--red);
    color:#fff;
  }
  .tab[data-outcome="overall"]::before{ background:var(--bronze); }

  .tab:hover{ transform:translateY(-2px); }
  .tab.active{ background:var(--panel-raised); color:var(--text); }
  .tab.active[data-outcome="victory"]{ background:var(--green); border-color:var(--green); color:#fff; }
  .tab.active[data-outcome="defeat"]{ background:var(--red); border-color:var(--red); color:#fff; }
  .tab.active[data-outcome="overall"]{ border-color:var(--bronze); }

  .tab .b-date{
    font-family:var(--font-mono);
    font-size:13px;
    font-weight:600;
    color:inherit;
  }
  .tab .b-loc{
    font-size:11px;
    color:inherit;
  }
  .tab .b-result{
    font-family:var(--font-mono);
    font-size:10px;
    letter-spacing:0.08em;
    text-transform:uppercase;
    margin-top:2px;
  }
  .tab[data-outcome="victory"] .b-result{ color:#fff; }
  .tab[data-outcome="defeat"] .b-result{ color:#fff; }
  .tab[data-outcome="overall"] .b-result{ color:var(--bronze); font-weight:600; }

  /* ============================================================
     MATCH PANEL
     ============================================================ */
  main{ max-width:980px; margin:0 auto; padding:8px 24px 80px; }

  .panel{
    background:var(--panel);
    border:1px solid var(--hairline);
    border-radius:10px;
    overflow:hidden;
  }

  .panel-header{
    padding:26px 28px 22px;
    border-bottom:1px solid var(--hairline-soft);
    display:flex;
    align-items:center;
    justify-content:space-between;
    flex-wrap:wrap;
    gap:16px;
  }

  .panel-title{
    font-family:var(--font-display);
    font-size:24px;
    font-weight:620;
  }
  .panel-meta{
    font-family:var(--font-mono);
    font-size:12px;
    color:var(--text-muted);
    margin-top:4px;
  }

  .rozuns-note{
    padding:16px 28px;
    background:rgba(75, 159, 93, 0.2);
    border-bottom:3px solid #5BC976;
    border-top:3px solid #FF00FF;
    border-left:3px solid #00FFFF;
    border-right:3px solid #FFFF00;
    font-family:var(--font-mono);
    font-size:22px;
    color:#5BC976;
    display:flex;
    align-items:center;
    font-weight:700;
    text-shadow:
      0 0 10px #5BC976,
      0 0 20px #FF00FF,
      0 0 30px #00FFFF,
      0 0 5px rgba(255, 255, 0, 0.5);
    background:linear-gradient(135deg, rgba(75, 159, 93, 0.3), rgba(255, 0, 255, 0.1), rgba(0, 255, 255, 0.1));
  }

  .rozuns-note span{
    font-weight:700;
    text-shadow:
      0 0 10px #5BC976,
      0 0 20px #FF00FF,
      0 0 30px #00FFFF,
      0 0 5px rgba(255, 255, 0, 0.5);
  }

  .rozuns-highlight{
    color:#FFFF00;
    font-weight:900;
    letter-spacing:0.1em;
    text-shadow:
      0 0 15px #FFFF00,
      0 0 30px #FF00FF,
      0 0 20px #00FFFF;
  }

  .result-pill{
    font-family:var(--font-mono);
    font-size:12px;
    letter-spacing:0.1em;
    text-transform:uppercase;
    padding:7px 16px;
    border-radius:999px;
    font-weight:600;
  }
  .result-pill.victory{ background:rgba(217,164,65,0.14); color:var(--gold-bright); border:1px solid rgba(217,164,65,0.35); }
  .result-pill.defeat{ background:rgba(178,64,47,0.14); color:var(--red-bright); border:1px solid rgba(178,64,47,0.35); }
  .result-pill.overall{ background:rgba(140,106,63,0.16); color:#C7A876; border:1px solid rgba(140,106,63,0.4); }

  /* Hall of Fame — only shown on Overall */
  .hof{
    display:grid;
    grid-template-columns:repeat(3, 1fr);
    gap:14px;
    padding:24px 28px 4px;
  }
  .hof-card{
    background:var(--panel-raised);
    border:1px solid var(--hairline);
    border-radius:8px;
    padding:18px 16px;
    position:relative;
  }
  .hof-rank{
    font-family:var(--font-mono);
    font-size:11px;
    letter-spacing:0.1em;
    color:var(--text-faint);
  }
  .hof-card[data-rank="1"] .hof-rank{ color:var(--gold-bright); }
  .hof-card[data-rank="2"] .hof-rank{ color:#C9CCD1; }
  .hof-card[data-rank="3"] .hof-rank{ color:var(--bronze); }
  .hof-name{
    font-family:var(--font-display);
    font-size:19px;
    font-weight:600;
    margin-top:6px;
  }
  .hof-kd{
    font-family:var(--font-mono);
    font-size:26px;
    font-weight:600;
    margin-top:8px;
    color:var(--text);
  }
  .hof-sub{
    font-family:var(--font-mono);
    font-size:11px;
    color:var(--text-muted);
    margin-top:4px;
  }

  /* Score share bar chart */
  .score-chart{
    display:grid;
    grid-template-columns:1fr;
    gap:12px;
    align-items:start;
    padding:14px 16px 10px;
    border-radius:16px;
    background:rgba(18,19,21,0.96);
    border:1px solid rgba(255,255,255,0.08);
    box-shadow:0 12px 24px rgba(0,0,0,0.16);
    backdrop-filter:blur(14px);
    transition:background 0.24s ease, transform 0.24s ease, box-shadow 0.24s ease;
  }
  .chart-header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:12px;
  }
  .chart-toggle{
    display:grid;
    place-items:center;
    width:24px;
    height:24px;
    padding:4px;
    border:none;
    background:rgba(255,255,255,0.04);
    border-radius:6px;
    color:var(--text-muted);
    cursor:pointer;
    transition:background 0.16s ease, color 0.16s ease, transform 0.16s ease;
  }
  .chart-toggle:hover{
    background:rgba(255,255,255,0.08);
    color:var(--text);
  }
  .chart-toggle:focus-visible{
    outline:none;
    background:rgba(255,255,255,0.12);
    color:var(--text);
  }
  .chart-toggle svg{
    transition:transform 0.24s ease;
  }
  .chart-toggle[aria-expanded="false"] svg{
    transform:rotate(-180deg);
  }
  .chart-content{
    display:grid;
    gap:8px;
    max-height:1000px;
    overflow:hidden;
    transition:max-height 0.32s ease, opacity 0.32s ease, margin 0.32s ease;
    opacity:1;
  }
  .score-chart.chart-collapsed .chart-content{
    max-height:0;
    opacity:0;
    margin:0;
  }
  .bar-chart-wrap{
    display:grid;
    place-items:center;
    width:100%;
    padding:8px 0;
    border-radius:12px;
    background:rgba(255,255,255,0.02);
  }
  .bar-chart{
    width:100%;
    height:auto;
    overflow:visible;
    filter:drop-shadow(0 6px 12px rgba(0,0,0,0.12));
    transition:filter 0.24s ease;
  }
  .bar-chart:hover{
    filter:drop-shadow(0 10px 16px rgba(0,0,0,0.16));
  }
  .bar{
    cursor:pointer;
    opacity:0.88;
    stroke:rgba(0,0,0,0.2);
    stroke-width:0.5;
    transition:opacity 0.24s ease, transform 0.24s cubic-bezier(0.34, 1.56, 0.64, 1), filter 0.24s ease, stroke 0.24s ease, width 0.24s ease, x 0.24s ease;
    transform-box:fill-box;
    transform-origin:left center;
  }
  .bar:hover,
  .bar:focus-visible,
  .bar.active{
    opacity:1;
    filter:brightness(1.28) saturate(1.2);
    stroke:rgba(255,255,255,0.32);
  }
  .bar-group:hover .bar-label,
  .bar-group:hover .bar-value,
  .bar-group.active .bar-label,
  .bar-group.active .bar-value{
    opacity:1;
  }
  .bar:focus-visible{
    outline:none;
    stroke:var(--text);
    stroke-width:1;
  }
  .bar-label{
    font-family:var(--font-mono);
    font-size:8px;
    fill:var(--text);
    text-anchor:start;
    pointer-events:none;
    transition:opacity 0.24s ease;
  }
  .bar-value{
    font-family:var(--font-mono);
    font-size:7px;
    font-weight:700;
    fill:var(--text);
    text-anchor:end;
    pointer-events:none;
    transition:opacity 0.24s ease;
  }
  .chart-detail{
    margin-top:6px;
    min-height:14px;
    color:var(--gold-bright);
    font-family:var(--font-mono);
    font-size:10px;
    font-weight:600;
  }
  .chart-detail .muted{
    color:var(--text-muted);
    font-weight:500;
  }
  .chart-copy{
    min-width:0;
  }
  .chart-title{
    font-family:var(--font-display);
    font-size:12px;
    font-weight:620;
  }
  .chart-meta{
    margin-top:2px;
    color:var(--text-muted);
    font-family:var(--font-mono);
    font-size:10px;
  }
  .legend{
    display:grid;
    grid-template-columns:repeat(2, minmax(0, 1fr));
    gap:4px 8px;
    margin-top:8px;
    max-height:160px;
    overflow:auto;
    padding-right:4px;
    scrollbar-width:thin;
  }
  .legend-item{
    display:grid;
    grid-template-columns:8px minmax(0, 1fr) auto;
    align-items:center;
    gap:6px;
    border:none;
    background:transparent;
    padding:2px 3px;
    border-radius:4px;
    font-family:var(--font-mono);
    font-size:10px;
    color:var(--text-muted);
    min-width:0;
    text-align:left;
    cursor:pointer;
    transition:background 0.16s ease, color 0.16s ease;
  }
  .legend-item:hover,
  .legend-item:focus-visible,
  .legend-item.active{
    background:rgba(255,255,255,0.05);
    color:var(--text);
  }
  .legend-item:focus-visible{
    outline:1px solid var(--gold-bright);
    outline-offset:2px;
  }
  .legend-swatch{
    width:8px;
    height:8px;
    border-radius:1px;
    border:1px solid rgba(255,255,255,0.12);
  }
  .legend-name{
    overflow:hidden;
    text-overflow:ellipsis;
    white-space:nowrap;
  }
  .legend-score{
    color:var(--text);
    font-weight:600;
  }

  /* Table */
  .table-scroll{ overflow-x:auto; padding:8px 28px 28px; }
  table{ width:100%; border-collapse:collapse; min-width:480px; }

  thead th{
    text-align:left;
    font-family:var(--font-mono);
    font-size:11px;
    letter-spacing:0.08em;
    text-transform:uppercase;
    color:var(--text-faint);
    font-weight:500;
    padding:10px 12px;
    border-bottom:1px solid var(--hairline);
    cursor:pointer;
    user-select:none;
    white-space:nowrap;
  }
  thead th:hover{ color:var(--text-muted); }
  thead th.sorted{ color:var(--gold-bright); }
  thead th .arrow{ display:inline-block; margin-left:4px; opacity:0.7; font-size:9px; }

  thead th:first-child, tbody td:first-child{ padding-left:14px; }

  tbody td{
    padding:11px 12px;
    border-bottom:1px solid var(--hairline-soft);
    font-size:14px;
  }
  tbody tr:last-child td{ border-bottom:none; }
  tbody tr:hover td{ background:rgba(255,255,255,0.02); }
  tbody tr.active-chart-row td{
    background:rgba(217,164,65,0.08);
  }

  td.num, th.num{ font-family:var(--font-mono); }
  td.rank{ font-family:var(--font-mono); color:var(--text-faint); width:28px; }
  tr[data-rank="1"] td.rank{ color:var(--gold-bright); }
  tr[data-rank="2"] td.rank{ color:#C9CCD1; }
  tr[data-rank="3"] td.rank{ color:var(--bronze); }

  td.kd{ font-family:var(--font-mono); font-weight:600; color:var(--gold-bright); }
  td.played{ color:var(--text-muted); font-family:var(--font-mono); }

  /* ============================================================
     FOOTER
     ============================================================ */
  footer{
    text-align:center;
    padding:36px 24px 56px;
    font-size:12px;
    color:var(--text-faint);
    font-family:var(--font-mono);
  }

  /* ============================================================
     RESPONSIVE
     ============================================================ */
  @media (max-width:640px){
    .hof{ grid-template-columns:1fr; }
    .score-chart{ grid-template-columns:1fr; padding:22px 18px 10px; }
    .pie{ width:min(100%, 240px); }
    .legend{ grid-template-columns:1fr; max-height:260px; }
    .panel-header{ flex-direction:column; align-items:flex-start; }

    table, thead, tbody, th, td, tr{ display:block; }
    table{ min-width:0; width:100%; }
    thead{ display:none; }
    tbody tr{
      border:1px solid var(--hairline-soft);
      border-radius:8px;
      margin-bottom:10px;
      padding:10px 14px;
    }
    tbody td{
      border-bottom:none;
      display:flex;
      justify-content:space-between;
      padding:6px 0;
      font-size:13px;
    }
    tbody td::before{
      content:attr(data-label);
      font-family:var(--font-mono);
      font-size:10px;
      letter-spacing:0.06em;
      text-transform:uppercase;
      color:var(--text-faint);
    }
    td.rank{ display:none; }
  }

  @media (prefers-reduced-motion: reduce){
    *{ transition:none !important; scroll-behavior:auto !important; }
  }
</style>
</head>
<body>

<header>
  <div class="eyebrow">Node War Record</div>
  <h1>War <span>Log</span></h1>
  <div class="subtitle">Family-by-family kill / death record, war by war</div>
  <div class="record-badge" id="recordBadge"></div>
</header>

<div class="tab-folder">

<footer>

</footer>

<script>
/* ================================================================

   ================================================================ */

/* ================================================================
   LOGIC — no edits needed below this line
   ================================================================ */

document.title = GUILD_NAME;

function kd(kills, deaths){
  if (kills === 0 && deaths === 0) return null;
  return deaths === 0 ? kills : kills / deaths;
}
function fmtKD(v){ return v === null ? "—" : v.toFixed(2); }

function dayShort(dateStr){
  const d = new Date(dateStr + "T00:00:00");
  return d.toLocaleDateString("en-US", { day:"numeric", month:"short" });
}

// Build Overall dataset by reducing across all matches
function buildOverall(){
  const totals = {};
  MATCHES.forEach(m=>{
    m.players.forEach(([name,k,d])=>{
      if(!totals[name]) totals[name] = {name, kills:0, deaths:0, played:0};
      totals[name].kills += k;
      totals[name].deaths += d;
      totals[name].played += 1;
    });
  });
  return Object.values(totals);
}

const wins = MATCHES.filter(m=>m.result==="Victory").length;
const losses = MATCHES.filter(m=>m.result==="Defeat").length;
document.getElementById("recordBadge").innerHTML =
  `<b class="win">${wins}W</b><span class="div">/</span><b class="loss">${losses}L</b><span class="div">·</span>${MATCHES.length} wars logged`;

// ---- Campaign strip ----
const strip = document.getElementById("campaignStrip");
const weekGroups = [];
const weekIndex = new Map();
const expandedWeeks = new Set();

function weekKey(dateStr){
  const d = new Date(dateStr + "T00:00:00");
  const day = d.getDay();
  const monday = new Date(d);
  monday.setDate(d.getDate() - ((day + 6) % 7));
  return monday.toISOString().slice(0,10);
}

function weekLabel(startDate){
  const start = new Date(startDate + "T00:00:00");
  const end = new Date(start);
  end.setDate(end.getDate() + 6);
  const short = { month:"short", day:"numeric" };
  return `${start.toLocaleDateString("en-US", short)} - ${end.toLocaleDateString("en-US", short)}`;
}

function buildWeekGroups(){
  MATCHES.forEach((m,i)=>{
    const key = weekKey(m.date);
    if (!weekIndex.has(key)){
      weekIndex.set(key, { week:key, matches:[] });
      weekGroups.push(weekIndex.get(key));
    }
    weekIndex.get(key).matches.push({ match:m, index:i });
  });
}

function makeBanner(outcome, dateLabel, locLabel, resultLabel, key){
  const b = document.createElement("button");
  b.className = "tab";
  b.dataset.outcome = outcome;
  b.dataset.key = key;
  b.setAttribute("aria-pressed","false");
  b.type = "button";
  b.innerHTML = `
    <div class="b-date">${dateLabel}</div>
    <div class="b-loc">${locLabel}</div>
    <div class="b-result">${resultLabel}</div>
  `;
  b.addEventListener("click", ()=>selectMatch(key));
  return b;
}

function renderTabs(){
  strip.innerHTML = "";
  strip.appendChild(makeBanner("overall","ALL","Record","Overall","overall"));

  weekGroups.forEach(group => {
    const groupNode = document.createElement("div");
    groupNode.className = "week-group";

    const header = document.createElement("button");
    header.className = "week-header";
    header.type = "button";
    header.dataset.week = group.week;
    const expanded = expandedWeeks.has(group.week);
    header.setAttribute("aria-expanded", expanded.toString());
    header.innerHTML = `<span>${weekLabel(group.week)}</span><span>${group.matches.length} matches</span>`;
    header.addEventListener("click", () => toggleWeek(group.week));
    groupNode.appendChild(header);

    if (expanded){
      const matchList = document.createElement("div");
      matchList.className = "week-matches";
      group.matches.forEach(({ match, index })=>{
        matchList.appendChild(makeBanner(
          match.result === "Victory" ? "victory" : "defeat",
          match.day, match.location,
          match.result === "Victory" ? "Win" : "Loss",
          String(index)
        ));
      });
      groupNode.appendChild(matchList);
    }

    strip.appendChild(groupNode);
  });

  document.querySelectorAll(".tab").forEach(b=>{
    const active = b.dataset.key === currentMatchKey;
    b.classList.toggle("active", active);
    b.setAttribute("aria-pressed", active ? "true" : "false");
  });
}

function toggleWeek(week){
  if (expandedWeeks.has(week)){
    expandedWeeks.delete(week);
  } else {
    expandedWeeks.add(week);
  }
  renderTabs();
}

// ---- Sorting state ----
let sortState = { key:"kd", dir:"desc" };
let currentMatchKey = "overall";

buildWeekGroups();
renderTabs();

function sortRows(rows, key, dir){
  const mult = dir === "asc" ? 1 : -1;
  return [...rows].sort((a,b)=>{
    let av = a[key], bv = b[key];
    if (av === null) av = -Infinity;
    if (bv === null) bv = -Infinity;
    if (typeof av === "string") return av.localeCompare(bv) * mult;
    return (av - bv) * mult;
  });
}

const meanComments = [
  "what the fuck was that shit?",
  "absolutely fucking terrible, my god",

  "holy shit, find a different game you absolute clown",

function buildRozunsNote(rows){
  const rozuns = rows.find(r => r.name === "Rozuns");
  if (!rozuns) return "";
  
  const kd = rozuns.kd;
  const meanComment = meanComments[Math.floor(Math.random() * meanComments.length)];
  
  if (kd < 1.0){
    return `
      <div class="rozuns-note">
        <span><strong>Special note for <span class="rozuns-highlight">Rozuns</span>: ${meanComment}</strong></span>
      </div>
    `;

  const niceComment = niceComments[Math.floor(Math.random() * niceComments.length)];

    <div class="rozuns-note">
      <span><strong><span class="rozuns-highlight">Rozuns</span>: ${niceComment} But ${meanComment}</strong></span>
    </div>

const chartColors = [
  "#E8B857", "#D97E3E", "#B8556E", "#7B5BA8", "#5B7EC3", "#4A9FB8",
  "#5BC0A8", "#6FBD9C", "#8FD89E", "#B8D886", "#D4C85D", "#E8A648",
  "#F0956B", "#E57C7D", "#D96B96", "#C376B8", "#8A7FB8", "#6B8EC3"
];

function compactName(name){
  return name.length > 13 ? `${name.slice(0, 12)}...` : name;
}

function renderScoreChart(rows, showHof){
  const scoreRows = sortRows(rows, "kills", "desc").filter(r=>r.kills > 0);
  const total = scoreRows.reduce((sum,r)=>sum + r.kills, 0);
  const maxKills = scoreRows[0]?.kills || 0;

  if (!total){
    return `
      <section class="score-chart" aria-label="Score share bar chart">
        <div class="chart-copy">
          <div class="chart-title">Score Share</div>
          <div class="chart-meta">No kills recorded for this view.</div>
        </div>
      </section>
    `;
  }

  const barHeight = 12;
  const chartHeight = scoreRows.length * (barHeight + 2) + 12;
  const barWidth = 140;

  const barsHTML = scoreRows.map((r, i) => {
    const pct = ((r.kills / total) * 100).toFixed(1);
    const barLength = (r.kills / maxKills) * barWidth;
    const color = chartColors[i % chartColors.length];
    const yPos = i * (barHeight + 2) + 6;
    return `
      <g class="bar-group" data-chart-index="${i}" data-name="${r.name}">
        <rect
          class="bar"
          x="0"
          y="${yPos}"
          width="${barLength}"
          height="${barHeight}"
          fill="${color}"
          tabindex="0"
          role="button"
          data-chart-index="${i}"
          data-name="${r.name}"
          data-kills="${r.kills}"
          data-pct="${pct}"
          aria-label="${r.name}: ${r.kills} kills, ${pct}% of score">
        </rect>
        <text class="bar-label" x="${barLength + 8}" y="${yPos + barHeight - 4}">${r.name}</text>
        <text class="bar-value" x="${barLength - 6}" y="${yPos + barHeight - 4}">${r.kills}</text>
      </g>
    `;
  }).join("");

  const legendHTML = scoreRows.map((r, i) => {
    const pct = ((r.kills / total) * 100).toFixed(1);
    const color = chartColors[i % chartColors.length];
    return `
      <button class="legend-item" type="button" data-chart-index="${i}" title="${r.name}: ${r.kills} kills, ${pct}%">
        <span class="legend-swatch" style="background:${color}"></span>
        <span class="legend-name">${r.name}</span>
        <span class="legend-score">${r.kills}</span>
      </button>
    `;
  }).join("");

  const first = scoreRows[0];
  const firstPct = ((first.kills / total) * 100).toFixed(1);

  return `
    <section class="score-chart" aria-label="Score share bar chart">
      <div class="chart-copy">
        <div class="chart-header">
          <div class="chart-title">Score Share</div>
          <button class="chart-toggle" type="button" aria-label="Toggle chart" aria-expanded="true" title="Toggle chart visibility">
            <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="6 9 12 15 18 9"></polyline>
            </svg>
          </button>
        </div>
        <div class="chart-meta">${showHof ? "Total kills across all logged wars" : "Kills by family for this war"}</div>
        <div class="chart-content">
          <div class="bar-chart-wrap">
            <svg class="bar-chart" viewBox="0 0 ${barWidth + 100} ${chartHeight}" aria-label="Interactive score share bar chart">
              <g class="bars">
                ${barsHTML}
              </g>
            </svg>
          </div>
          <div class="chart-detail" aria-live="polite">${first.name}: ${first.kills} kills <span class="muted">(${firstPct}% of score)</span></div>
          <div class="legend">${legendHTML}</div>
        </div>
      </div>
    </section>
  `;
}

function attachScoreChartInteractions(panel){
  const chart = panel.querySelector(".score-chart");
  if (!chart) return;

  const toggle = chart.querySelector(".chart-toggle");
  const bars = [...chart.querySelectorAll(".bar")];
  const barGroups = [...chart.querySelectorAll(".bar-group")];
  const legendItems = [...chart.querySelectorAll(".legend-item")];
  const detail = chart.querySelector(".chart-detail");
  const tableRows = [...panel.querySelectorAll("tbody tr[data-name]")];
  const barByName = new Map(bars.map(b=>[b.dataset.name, b]));
  const groupByName = new Map(barGroups.map(g=>[g.dataset.name, g]));

  if (toggle){
    toggle.addEventListener("click", ()=>{
      const isCollapsed = chart.classList.toggle("chart-collapsed");
      toggle.setAttribute("aria-expanded", !isCollapsed);
    });
  }

  function activate(index){
    const bar = bars[index];
    if (!bar) return;

    bars.forEach(b=>b.classList.toggle("active", b === bar));
    barGroups.forEach(g=>g.classList.toggle("active", g === groupByName.get(bar.dataset.name)));
    legendItems.forEach(item=>item.classList.toggle("active", item.dataset.chartIndex === String(index)));
    tableRows.forEach(row=>row.classList.toggle("active-chart-row", row.dataset.name === bar.dataset.name));

    const name = bar.dataset.name;
    const kills = bar.dataset.kills;
    const pct = bar.dataset.pct;
    detail.innerHTML = `${name}: ${kills} kills <span class="muted">(${pct}% of score)</span>`;
  }

  function activateName(name){
    const bar = barByName.get(name);
    if (!bar) return;
    activate(Number(bar.dataset.chartIndex));
  }

  bars.forEach(bar=>{
    const index = Number(bar.dataset.chartIndex);
    bar.addEventListener("mouseenter", ()=>activate(index));
    bar.addEventListener("focus", ()=>activate(index));
    bar.addEventListener("click", ()=>activate(index));
    bar.addEventListener("keydown", event=>{
      if (event.key === "Enter" || event.key === " "){
        event.preventDefault();
        activate(index);
      }
    });
  });

  legendItems.forEach(item=>{
    const index = Number(item.dataset.chartIndex);
    item.addEventListener("mouseenter", ()=>activate(index));
    item.addEventListener("focus", ()=>activate(index));
    item.addEventListener("click", ()=>activate(index));
  });

  tableRows.forEach(row=>{
    row.addEventListener("mouseenter", ()=>activateName(row.dataset.name));
    row.addEventListener("focusin", ()=>activateName(row.dataset.name));
  });

  activate(0);
}

// ---- Render a match or overall panel ----
function selectMatch(key){
  currentMatchKey = key;

  if (key !== "overall"){
    const weekGroup = weekGroups.find(g=> g.matches.some(({ index })=> String(index) === key));
    if (weekGroup){
      const weekSelect = document.querySelector("#weekSelect");
      if (weekSelect){
        weekSelect.value = weekGroup.week;
      }
    }
  }

  document.querySelectorAll(".tab").forEach(b=>{
    const active = b.dataset.key === key;
    b.classList.toggle("active", active);
    b.setAttribute("aria-pressed", active ? "true":"false");
  });

  const panel = document.getElementById("matchPanel");
  let rows, title, meta, resultClass, resultLabel, showHof = false;

  if (key === "overall"){
    rows = buildOverall().map(r=>({...r, kd: kd(r.kills, r.deaths)}));
    title = "Overall Record";
    meta = `${MATCHES.length} wars · ${rows.length} families`;
    resultClass = "overall"; resultLabel = "All Wars";
    showHof = true;
  } else {
    const m = MATCHES[Number(key)];
    rows = m.players.map(([name,k,d])=>({name, kills:k, deaths:d, kd: kd(k,d)}));
    const dt = new Date(m.date + "T00:00:00");
    title = dt.toLocaleDateString("en-US", { weekday:"long", day:"numeric", month:"long", year:"numeric" });
    meta = `${m.location} · Node War`;
    resultClass = m.result === "Victory" ? "victory":"defeat";
    resultLabel = m.result === "Victory" ? "Occupation Success" : "Occupation Failed";
  }

  sortState = { key:"kd", dir:"desc" };
  renderPanel(panel, rows, title, meta, resultClass, resultLabel, showHof);
}

function renderPanel(panel, rows, title, meta, resultClass, resultLabel, showHof){
  const sorted = sortRows(rows, sortState.key, sortState.dir);

  let hofHTML = "";
  if (showHof){
    const top3 = sortRows(rows, "kd", "desc").slice(0,3);
    hofHTML = `<div class="hof">` + top3.map((r,i)=>`
      <div class="hof-card" data-rank="${i+1}">
        <div class="hof-rank">RANK ${i+1}</div>
        <div class="hof-name">${r.name}</div>
        <div class="hof-kd">${fmtKD(r.kd)}</div>
        <div class="hof-sub">${r.kills}K / ${r.deaths}D · ${r.played} wars</div>
      </div>
    `).join("") + `</div>`;
  }

  const cols = showHof
    ? [["name","Family"],["kills","Kills"],["deaths","Deaths"],["kd","K/D"],["played","Wars"]]
    : [["name","Family"],["kills","Kills"],["deaths","Deaths"],["kd","K/D"]];

  const headHTML = cols.map(([key,label])=>{
    const isSorted = sortState.key === key;
    const arrow = isSorted ? (sortState.dir === "asc" ? "▲" : "▼") : "";
    const cls = key === "name" ? "" : "num";
    return `<th class="${cls} ${isSorted?'sorted':''}" data-key="${key}">${label}<span class="arrow">${arrow}</span></th>`;
  }).join("");

  const bodyHTML = sorted.map((r,i)=>{
    const cells = [
      `<td class="rank">${i+1}</td>`,
      `<td data-label="Family">${r.name}</td>`,
      `<td class="num" data-label="Kills">${r.kills}</td>`,
      `<td class="num" data-label="Deaths">${r.deaths}</td>`,
      `<td class="num kd" data-label="K/D">${fmtKD(r.kd)}</td>`,
    ];
    if (showHof) cells.push(`<td class="num played" data-label="Wars">${r.played}</td>`);
    return `<tr data-rank="${i+1}" data-name="${r.name}">${cells.join("")}</tr>`;
  }).join("");

  panel.innerHTML = `
    <div class="panel-header">
      <div>
        <div class="panel-title">${title}</div>
        <div class="panel-meta">${meta}</div>
      </div>
      <div class="result-pill ${resultClass}">${resultLabel}</div>
    </div>
    ${buildRozunsNote(rows)}
    ${hofHTML}
    <div class="table-scroll">
      <table>
        <thead><tr><th class="rank"></th>${headHTML}</tr></thead>
        <tbody>${bodyHTML}</tbody>
      </table>
    </div>
  `;

  attachScoreChartInteractions(panel);

  panel.querySelectorAll("thead th[data-key]").forEach(th=>{
    th.addEventListener("click", ()=>{
      const key = th.dataset.key;
      if (sortState.key === key){
        sortState.dir = sortState.dir === "asc" ? "desc" : "asc";
      } else {
        sortState = { key, dir: key === "name" ? "asc" : "desc" };
      }
      renderPanel(panel, rows, title, meta, resultClass, resultLabel, showHof);
    });
  });
}

// Initial view
selectMatch("overall");
</script>
