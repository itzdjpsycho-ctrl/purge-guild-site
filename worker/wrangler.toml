name = "purge-signups"
main = "src/worker.js"
compatibility_date = "2026-01-01"

# Create the namespace once with:  wrangler kv namespace create SIGNUPS_KV
# then paste the printed id below.
kv_namespaces = [
  { binding = "SIGNUPS_KV", id = "080b0d66de544ebe9c5ac9f6f55bf9da" }
]

# Not secret — the OAuth app's public client id (Discord Developer Portal → OAuth2).
# Officers are managed from the website itself (see worker.js /officers), not via
# Discord role IDs, so no GUILD_ID / ADMIN_ROLE_IDS are needed here.
[vars]
DISCORD_CLIENT_ID = "1519482554917584916"

# Secrets are NOT stored here — set them with:
#   wrangler secret put DISCORD_BOT_TOKEN     (same value as the bot's DISCORD_TOKEN)
#   wrangler secret put ADMIN_POST_PASSWORD   (shared password admins type on the site — kept as a break-glass fallback)
#   wrangler secret put BOT_PUSH_SECRET       (must match the bot's BOT_PUSH_SECRET)
#   wrangler secret put DISCORD_CLIENT_SECRET (Discord Developer Portal → OAuth2 → client secret)
# For local `wrangler dev`, put the same four in worker/.dev.vars (git-ignored).
